<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام توزيع القاعات الامتحانية</title>
 
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
 
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:   '#0f766e',
                        secondary: '#111827',
                        accent:    '#fbbf24',
                    },
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
 
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
 
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
 
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border-top-color: #0f766e; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">
 
    <!-- Navbar -->
    <nav id="navbar" class="bg-white shadow-md hidden">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="ph-fill ph-student text-3xl text-primary"></i>
                <span class="text-xl font-bold text-secondary">إدارة القاعات</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm font-medium text-gray-600 hidden md:block"></span>
                <!--
                    زر الخروج: يستدعي AuthController.logout()
                    لاحظ: لا يوجد هنا أي منطق — فقط استدعاء الـ Controller
                -->
                <button onclick="AuthController.logout()"
                    class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm transition">
                    <i class="ph-bold ph-sign-out align-middle ml-1"></i> خروج
                </button>
            </div>
        </div>
    </nav>
 
    <!-- Main Content — يُحقن فيه HTML عبر الـ Views -->
    <main id="app-content" class="flex-grow container mx-auto px-4 py-8">
    </main>
 
    <!-- Footer -->
    <footer class="bg-white border-t py-6 text-center text-gray-500 text-sm">
        <p>&copy; Faculty Of Informatics Engineering - University Of Aleppo 2026</p>
    </footer>
 
    <!-- ============================================================
         ترتيب تحميل الملفات مهم جداً:
         1. Models أولاً  → لأن الـ Controllers تعتمد عليها
         2. Views ثانياً  → لأن الـ Controllers تعتمد عليها
         3. Controllers أخيراً → لأنها تستخدم Models و Views
         ============================================================ -->
 
    <!-- MODELS -->
    <script src="js/models/userModel.js"></script>
    <script src="js/models/allocationModel.js"></script>
 
    <!-- VIEWS -->
    <script src="js/views/loginView.js"></script>
    <script src="js/views/adminView.js"></script>
    <script src="js/views/studentView.js"></script>
    <script src="js/views/supervisorView.js"></script>
 
    <!-- CONTROLLERS -->
    <script src="js/controllers/authController.js"></script>
    <script src="js/controllers/allocationController.js"></script>
 
    <!-- نقطة البداية: بعد تحميل كل الملفات، شغّل التطبيق -->
    <script>
        document.addEventListener('DOMContentLoaded', AuthController.init);
    </script>
 
</body>
</html>
